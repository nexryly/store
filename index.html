<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EverMine Store</title>
    <style>
        /* Black and Purple Theme */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            line-height: 1.6; 
            background-color: #0d0d0d; 
            color: #ffffff; 
        }
        .container { 
            max-width: 800px; 
            margin: auto; 
            background: #1a1a1a; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 0 20px rgba(128, 0, 128, 0.3); 
            border: 2px solid #4b0082;
        }
        h1 { 
            color: #bd00ff; 
            text-align: center; 
            text-shadow: 2px 2px 4px #000;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 20px; 
            color: #ffffff; 
            border: 1px solid #4b0082;
        }
        th, td { 
            border: 1px solid #4b0082; 
            padding: 12px; 
            text-align: center; 
        }
        th { 
            background-color: #4b0082; 
            color: white; 
        }
        tr:nth-child(even) { background-color: #262626; }
        .footer { 
            text-align: center; 
            margin-top: 20px; 
            font-style: italic; 
            color: #c0c0c0; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌍 EVERMINE STORE 🌍</h1>
    
    <table>
        <thead>
            <tr>
                <th>Rank</th>
                <th>Trial (1 Bulan)</th>
                <th>Permanent</th>
            </tr>
        </thead>
        <tbody>
            <tr><td>Member</td><td>Gratis</td><td>-</td></tr>
            <tr><td>VIP</td><td>Rp25.000</td><td>Rp40.000</td></tr>
            <tr><td>VIP+</td><td>Rp40.000</td><td>Rp60.000</td></tr>
            <tr><td>MVP</td><td>Rp55.000</td><td>Rp85.000</td></tr>
            <tr><td>Legendary</td><td>Rp190.000</td><td>Rp255.000</td></tr>
            <tr><td>Divine</td><td>Rp250.000</td><td>Rp355.000</td></tr>
        </tbody>
    </table>

    <div class="footer">
        <p>💳 Pembayaran: QRIS | Hubungi admin untuk PM pembelian</p>
    </div>
</div>

</body>
</html>
