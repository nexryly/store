<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EverMine Store | Premium</title>
    <style>
        :root {
            --bg-dark: #050505;
            --card-bg: #120f1a;
            --purple-neon: #a855f7;
            --purple-deep: #4c1d95;
            --text: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 500px; margin: auto; }

        .banner {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, var(--purple-deep), var(--bg-dark));
            border-radius: 20px;
            border: 1px solid var(--purple-neon);
            margin-bottom: 25px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #2d2640;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-name { font-weight: 600; font-size: 1.1em; }
        .price { color: var(--purple-neon); font-weight: bold; margin-top: 4px; }

        .btn-checkout {
            background: var(--purple-neon);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9em;
            font-weight: bold;
            display: inline-block;
        }

        input[type="number"] {
            width: 45px;
            background: #252033;
            border: 1px solid var(--purple-neon);
            color: white;
            padding: 5px;
            border-radius: 5px;
            margin-right: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="banner">
        <h1>EVERMINE STORE</h1>
        <p>Premium Minecraft Server Shop</p>
    </div>

    <div class="card">
        <div>
            <div class="item-name">Mystery Key</div>
            <div class="price">Rp4.500</div>
        </div>
        <div>
            <input type="number" id="qty-key" value="1" min="1">
            <a href="#" class="btn-checkout" onclick="buy('Mystery Key', 4500, 'key')">Beli</a>
        </div>
    </div>

    <div class="card">
        <div>
            <div class="item-name">VIP Trial</div>
            <div class="price">Rp25.000</div>
        </div>
        <div>
            <input type="number" id="qty-vip" value="1" min="1">
            <a href="#" class="btn-checkout" onclick="buy('VIP Trial', 25000, 'vip')">Beli</a>
        </div>
    </div>
    
    <div class="card">
        <div>
            <div class="item-name">Rank Slayer</div>
            <div class="price">Rp80.000</div>
        </div>
        <div>
            <input type="number" id="qty-slayer" value="1" min="1">
            <a href="#" class="btn-checkout" onclick="buy('Rank Slayer', 80000, 'slayer')">Beli</a>
        </div>
    </div>
</div>

<script>
    function buy(name, price, id) {
        const qty = document.getElementById('qty-' + id).value;
        const total = qty * price;
        // Format angka ke Rupiah
        const totalFormatted = total.toLocaleString('id-ID');
        const msg = `Halo Admin, saya ingin beli ${qty}x ${name}. Total pembayaran: Rp${totalFormatted}.`;
        window.location.href = `https://wa.me/628975293251?text=${encodeURIComponent(msg)}`;
    }
</script>
</body>
</html>
