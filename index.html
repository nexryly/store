<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EverMine Store</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0a0a0a; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; text-align: center; }
        
        /* Header & Title */
        h1 { color: #00ff88; margin-top: 20px; }
        .status-badge { background: #1a2e25; color: #00ff88; padding: 5px 15px; border-radius: 20px; font-size: 0.9em; border: 1px solid #00ff88; display: inline-block; margin-bottom: 20px; }
        
        /* Buttons */
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; font-weight: bold; text-decoration: none; cursor: pointer; border: none; }
        .btn-green { background-color: #00a86b; color: white; }
        .btn-dark { background-color: #1a1a2e; color: #a0a0c0; border: 1px solid #333; }
        
        /* Server Info Box */
        .info-box { background: #151515; border: 1px solid #333; padding: 20px; border-radius: 12px; margin-top: 30px; text-align: left; }
        .ip-label { color: #888; font-size: 0.8em; margin-bottom: 5px; }
        .ip-address { font-size: 1.2em; font-weight: bold; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="status-badge">● EVERMINE SERVER ACTIVE</div>
    <h1>SUPPORT EVERMINESMP</h1>
    <p>Dapatkan Rank Eksklusif, EverMine Key, serta beragam keistimewaan menarik untuk mempercepat petualangan bertahan hidupmu di server kami!</p>

    <a href="#" class="btn btn-green">Browse Ranks</a>
    <a href="#" class="btn btn-dark">Beli Crate Keys</a>

    <div class="info-box">
        <div class="ip-label">IP SERVER</div>
        <div class="ip-address">play.everminesmp.my.id</div>
    </div>
</div>

</body>
</html>
