<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EverMineSMP Store</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --purple: #8b5cf6;
            --purple-glow: rgba(139, 92, 246, 0.4);
            --text: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }

        /* Hero */
        .hero { text-align: center; padding: 40px 20px; border-bottom: 2px solid #222; }
        .status { color: #22c55e; font-weight: bold; background: #064e3b; padding: 5px 15px; border-radius: 20px; }
        
        /* Card Styles */
        .card { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 15px; margin-bottom: 20px; transition: 0.3s; }
        .card:hover { border-color: var(--purple); box-shadow: 0 0 15px var(--purple-glow); }
        .badge { font-size: 0.7em; background: #333; padding: 4px 8px; border-radius: 5px; color: var(--purple); }
        
        /* Buttons */
        .btn { display: block; width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-align: center; margin-top: 10px; }
        .btn-purple { background: linear-gradient(90deg, #8b5cf6, #6d28d9); color: white; }
        .btn-wa { background: #25d366; color: white; text-decoration: none; }
        
        /* Inputs */
        input { width: 100%; padding: 10px; margin: 5px 0; background: #222; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <h1>EverMineSMP</h1>
        <p class="status">● Server Online</p>
        <p>IP: play.everminesmp.my.id <button onclick="navigator.clipboard.writeText('play.everminesmp.my.id')">Copy</button></p>
        <a href="https://chat.whatsapp.com/F5MypSimVr00PClrlpbGS3" class="btn btn-wa">Join WhatsApp</a>
    </div>

    <h2>⭐ Rank Trial</h2>
    <div id="trial-ranks">
        <!-- Contoh Card Rank -->
        <div class="card">
            <span class="badge">STARTER</span>
            <h3>VIP</h3>
            <p>Rp25.000 / 30 Hari</p>
            <button class="btn btn-purple" onclick="checkout('VIP Trial', 25000)">Beli Sekarang</button>
        </div>
    </div>

    <h2>👑 Rank Permanent</h2>
    <div id="permanent-ranks">
        <div class="card">
            <span class="badge">PREMIUM</span>
            <h3>VIP</h3>
            <p>Rp40.000</p>
            <button class="btn btn-purple" onclick="checkout('VIP Permanent', 40000)">Beli Sekarang</button>
        </div>
    </div>

    <h2>🗝 EverMine Key</h2>
    <div class="card">
        <input type="number" id="key-qty" placeholder="Jumlah Key" oninput="calculateKey()">
        <input type="text" id="mc-user" placeholder="Username Minecraft">
        <p>Total: Rp<span id="total-price">0</span></p>
        <button class="btn btn-purple" onclick="sendKeyCheckout()">Checkout WhatsApp</button>
    </div>
</div>

<script>
    function calculateKey() {
        let qty = document.getElementById('key-qty').value;
        document.getElementById('total-price').innerText = (qty * 4500).toLocaleString();
    }

    function sendKeyCheckout() {
        let qty = document.getElementById('key-qty').value;
        let total = qty * 4500;
        let user = document.getElementById('mc-user').value;
        let msg = `Halo Admin EverMine Store! 👋\n\nSaya ingin membeli item berikut:\nItem: ${qty}x EVERMINE KEY\nTotal Harga: Rp${total.toLocaleString()}\nUsername Minecraft: ${user}\n\nMohon info instruksi pembayaran / QRIS. Terima kasih!`;
        window.location.href = `https://wa.me/628975293251?text=${encodeURIComponent(msg)}`;
    }

    function checkout(rank, price) {
        let msg = `Halo Admin, saya ingin membeli ${rank} seharga Rp${price.toLocaleString()}`;
        window.location.href = `https://wa.me/628975293251?text=${encodeURIComponent(msg)}`;
    }
</script>

</body>
</html>
